name: Workflow Tests

on:
  push:
    # TEMP: feat/runwayml-proxy-node added to validate the new RunwayML nodes
    # against the Cloud proxy via real workflow tests. Remove before merge.
    branches: ["main", "feat/runwayml-proxy-node"]
  pull_request:
    branches: ["feat/runwayml-proxy-node"]
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-tests:
    runs-on: ubuntu-latest
    env:
      GT_CLOUD_API_KEY: ${{ secrets.GT_CLOUD_API_KEY }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout griptape-nodes-library-testing
        uses: actions/checkout@v4
        with:
          repository: griptape-ai/griptape-nodes-library-testing
          path: griptape-nodes-library-testing

      - name: Move testing library to sibling directory
        run: mv griptape-nodes-library-testing ../griptape-nodes-library-testing

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system griptape-nodes pytest pytest-asyncio pytest-timeout python-dotenv

      - name: Run workflow tests
        # --timeout-method=signal so a single hung provider fails one test
        # rather than killing the whole pytest run; --timeout-method=thread
        # cannot preempt the asyncio event loop.
        # TEMP: -k runway scopes the run to the new RunwayML nodes on
        # feat/runwayml-proxy-node. Remove before merge.
        run: pytest -v --timeout=600 --timeout-method=signal -k runway tests/workflows/test_integration_workflows.py
